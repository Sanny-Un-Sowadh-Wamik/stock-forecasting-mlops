name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.11
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install (serving + dev deps)
        run: uv pip install --system -e ".[api,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy, non-blocking)
        run: mypy src || true

      - name: Run tests
        run: pytest -q
